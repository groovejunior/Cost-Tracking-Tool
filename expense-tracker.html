<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1">
<meta name="theme-color" content="#F6F5F2">
<title>Spend — expense tracker</title>
<style>
  :root{
    --paper:#F6F5F2; --card:#FFFFFF; --ink:#1B1A16; --muted:#6C6A62; --faint:#9C998F;
    --hair:#E7E4DC; --hair-strong:#DAD6CC; --ink-soft:#2C2A24;
    --ok:#1D9E75; --ok-deep:#0F6E56; --over:#C0392B;
    --radius:14px;
    --safe-b:env(safe-area-inset-bottom,0px);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;height:100%;background:var(--paper);color:var(--ink);overflow:hidden;overscroll-behavior:none;}
  body{font-size:16px;line-height:1.4;}
  button{font-family:inherit;color:inherit;cursor:pointer;}
  input{font-family:inherit;}
  .tabular{font-variant-numeric:tabular-nums;}

  .app{max-width:440px;margin:0 auto;height:100vh;height:100dvh;background:var(--paper);
    display:flex;flex-direction:column;position:relative;overflow:hidden;
    padding-top:env(safe-area-inset-top,0px);}
  .app.modal .nav{display:none;}

  /* screens */
  .screen{display:none;flex:1;flex-direction:column;min-height:0;}
  .screen.active{display:flex;}
  .scroll{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:0 16px 96px;}

  .topbar{display:flex;align-items:center;justify-content:space-between;
    padding:14px 16px 10px;flex-shrink:0;}
  .topbar h1{font-size:18px;font-weight:600;margin:0;letter-spacing:-.01em;}
  .month{display:flex;align-items:center;gap:5px;font-size:18px;font-weight:600;letter-spacing:-.01em;}
  .iconbtn{background:none;border:none;padding:6px;border-radius:10px;color:var(--muted);display:grid;place-items:center;}
  .iconbtn:active{background:var(--hair);}
  .icon{width:22px;height:22px;display:inline-block;vertical-align:middle;}
  .icon svg{width:100%;height:100%;display:block;}

  /* hero */
  .hero{background:var(--card);border:1px solid var(--hair);border-radius:18px;padding:18px;margin-top:4px;}
  .hero .lbl{font-size:12px;color:var(--muted);letter-spacing:.02em;text-transform:uppercase;font-weight:600;}
  .hero .total{font-size:38px;font-weight:650;letter-spacing:-.02em;margin:4px 0 14px;line-height:1;}
  .bar{height:8px;border-radius:6px;background:var(--hair);overflow:hidden;}
  .bar > i{display:block;height:100%;border-radius:6px;background:var(--ok);transition:width .35s ease;}
  .bar.over > i{background:var(--over);}
  .budgetline{display:flex;justify-content:space-between;align-items:baseline;margin-top:8px;font-size:13px;}
  .budgetline .a{color:var(--ink);font-weight:550;}
  .budgetline .b{color:var(--muted);}
  .fixedline{display:flex;align-items:center;gap:6px;margin-top:12px;padding-top:12px;
    border-top:1px solid var(--hair);font-size:12.5px;color:var(--faint);}
  .fixedline .icon{width:14px;height:14px;}

  .addbtn{width:100%;margin-top:14px;background:var(--ink);color:#fff;border:none;border-radius:14px;
    padding:15px;font-size:16px;font-weight:600;display:flex;align-items:center;justify-content:center;gap:8px;
    letter-spacing:-.01em;}
  .addbtn:active{transform:scale(.985);}
  .addbtn .icon{width:20px;height:20px;}

  .sectlabel{font-size:12px;font-weight:600;color:var(--muted);letter-spacing:.03em;
    text-transform:uppercase;margin:22px 2px 10px;display:flex;justify-content:space-between;align-items:center;}
  .sectlabel a{color:var(--faint);text-decoration:none;display:flex;}

  /* category cards */
  .catgrid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
  .catcard{background:var(--card);border:1px solid var(--hair);border-radius:var(--radius);padding:13px 14px;}
  .catcard .dot{width:30px;height:30px;border-radius:9px;display:grid;place-items:center;margin-bottom:9px;}
  .catcard .dot .icon{width:17px;height:17px;color:#fff;}
  .catcard .cn{font-size:13.5px;color:var(--muted);}
  .catcard .cv{font-size:17px;font-weight:600;letter-spacing:-.01em;margin-top:1px;}

  /* rows */
  .rows{display:flex;flex-direction:column;}
  .rowwrap{position:relative;overflow:hidden;border-bottom:1px solid var(--hair);}
  .rowwrap:last-child{border-bottom:none;}
  .row{display:flex;align-items:center;gap:12px;padding:12px 2px;background:var(--paper);
    position:relative;transition:transform .22s ease;z-index:1;}
  .rowwrap.list-row .row{background:var(--card);padding:13px 14px;}
  .rowwrap.list-row{background:var(--card);border-radius:0;}
  .badge{width:34px;height:34px;border-radius:10px;display:grid;place-items:center;flex-shrink:0;}
  .badge .icon{width:18px;height:18px;color:#fff;}
  .rmid{flex:1;min-width:0;}
  .rmid .t{font-size:15px;font-weight:550;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;letter-spacing:-.01em;}
  .rmid .s{font-size:12.5px;color:var(--muted);margin-top:1px;}
  .rright{text-align:right;flex-shrink:0;}
  .rright .amt{font-size:15px;font-weight:600;letter-spacing:-.01em;}
  .rright .dt{font-size:12px;color:var(--faint);margin-top:1px;}
  .actions{position:absolute;top:0;right:0;bottom:0;display:flex;z-index:0;}
  .act{border:none;color:#fff;width:76px;display:flex;flex-direction:column;align-items:center;
    justify-content:center;gap:4px;font-size:12px;font-weight:600;}
  .act .icon{width:18px;height:18px;color:#fff;}
  .act.edit{background:#3B7ACF;}
  .act.del{background:var(--over);}
  .rowwrap.open .row{transform:translateX(-152px);}

  /* filter chips */
  .chips{display:flex;gap:8px;overflow-x:auto;padding:2px 16px 4px;flex-shrink:0;scrollbar-width:none;}
  .chips::-webkit-scrollbar{display:none;}
  .chip{flex-shrink:0;border:1px solid var(--hair-strong);background:var(--card);border-radius:999px;
    padding:7px 14px;font-size:13px;font-weight:550;color:var(--muted);white-space:nowrap;}
  .chip.active{background:var(--ink);border-color:var(--ink);color:#fff;}

  .listcard{background:var(--card);border:1px solid var(--hair);border-radius:16px;overflow:hidden;margin-top:6px;}
  .daygroup{padding:14px 14px 4px;font-size:12px;font-weight:600;color:var(--faint);letter-spacing:.03em;text-transform:uppercase;}

  /* nav */
  .nav{flex-shrink:0;display:flex;background:var(--card);border-top:1px solid var(--hair);
    padding:6px 4px calc(6px + var(--safe-b));}
  .nav button{flex:1;background:none;border:none;padding:6px 0 4px;display:flex;flex-direction:column;
    align-items:center;gap:3px;color:var(--faint);font-size:11px;font-weight:550;border-radius:10px;}
  .nav button .icon{width:23px;height:23px;}
  .nav button.on{color:var(--ink);}

  /* add screen */
  .amountwrap{text-align:center;padding:26px 0 10px;}
  .amountwrap .amtinput{border:none;background:none;text-align:center;font-size:46px;font-weight:650;
    letter-spacing:-.02em;color:var(--ink);width:100%;outline:none;padding:0;}
  .amountwrap .amtinput::placeholder{color:var(--hair-strong);}
  .amountwrap .cur{font-size:14px;color:var(--muted);font-weight:600;margin-top:2px;letter-spacing:.04em;text-transform:uppercase;}
  .pickgrid{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
  .pick{display:flex;align-items:center;gap:10px;padding:11px 12px;border:1px solid var(--hair);
    border-radius:12px;background:var(--card);font-size:13.5px;font-weight:550;color:var(--ink);text-align:left;}
  .pick .pdot{width:26px;height:26px;border-radius:8px;display:grid;place-items:center;flex-shrink:0;}
  .pick .pdot .icon{width:15px;height:15px;color:#fff;}
  .pick.sel{border-color:var(--ink);border-width:2px;padding:10px 11px;}
  .field{margin-top:16px;}
  .field .fl{font-size:12px;font-weight:600;color:var(--muted);letter-spacing:.02em;text-transform:uppercase;margin-bottom:7px;}
  .datepill{position:relative;display:flex;align-items:center;gap:9px;padding:12px 13px;border:1px solid var(--hair);
    border-radius:12px;background:var(--card);font-size:14px;color:var(--ink);}
  .datepill .icon{width:17px;height:17px;color:var(--muted);}
  .datepill .chev{margin-left:auto;color:var(--faint);}
  .datepill input[type=date]{position:absolute;inset:0;width:100%;height:100%;opacity:0;border:none;
    margin:0;padding:0;cursor:pointer;-webkit-appearance:none;appearance:none;}
  .noteinput{width:100%;border:1px solid var(--hair);border-radius:12px;padding:12px 13px;
    font-size:15px;background:var(--card);outline:none;color:var(--ink);}
  .noteinput:focus{border-color:var(--hair-strong);}
  .savebtn{width:100%;margin-top:20px;background:var(--ink);color:#fff;border:none;border-radius:14px;
    padding:16px;font-size:16px;font-weight:600;letter-spacing:-.01em;}
  .savebtn:disabled{background:var(--hair-strong);color:#fff;}
  .savebtn:not(:disabled):active{transform:scale(.985);}

  /* stub screen */
  .stub{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:40px;gap:10px;color:var(--muted);}
  .stub .icon{width:34px;height:34px;color:var(--faint);}
  .stub h2{font-size:17px;font-weight:600;color:var(--ink);margin:4px 0 0;}
  .stub p{font-size:14px;margin:0;max-width:240px;}

  .empty{text-align:center;color:var(--faint);font-size:14px;padding:40px 20px;}

  @media (prefers-reduced-motion: reduce){*{transition:none !important;}}
  :focus-visible{outline:2px solid var(--ok-deep);outline-offset:2px;}
</style>
</head>
<body>
<div class="app" id="app">

  <!-- HOME -->
  <section class="screen active" id="screen-home">
    <div class="topbar">
      <div class="month tabular" id="monthLabel">This month</div>
      <button class="iconbtn" aria-label="Settings" data-ico="settings"></button>
    </div>
    <div class="scroll" id="homeScroll"></div>
  </section>

  <!-- LIST -->
  <section class="screen" id="screen-list">
    <div class="topbar">
      <h1>Expenses</h1>
      <button class="iconbtn" aria-label="Filter" data-ico="filter"></button>
    </div>
    <div class="chips" id="filterChips"></div>
    <div class="scroll" id="listScroll"></div>
  </section>

  <!-- ADD -->
  <section class="screen" id="screen-add">
    <div class="topbar">
      <button class="iconbtn" id="addBack" aria-label="Cancel" data-ico="x"></button>
      <h1 style="font-size:16px;" id="addTitle">New expense</h1>
      <span style="width:34px"></span>
    </div>
    <div class="scroll">
      <div class="amountwrap">
        <input class="amtinput tabular" id="amtInput" inputmode="decimal" placeholder="0,00"
               aria-label="Amount in euros" autocomplete="off">
        <div class="cur">EUR</div>
      </div>
      <div class="field">
        <div class="fl">Category</div>
        <div class="pickgrid" id="pickGrid"></div>
      </div>
      <div class="field">
        <div class="fl">Date</div>
        <div class="datepill">
          <span class="icon" data-ico="calendar"></span><span id="dateText">Today</span>
          <span class="icon chev" data-ico="chevron"></span>
          <input type="date" id="dateInput" aria-label="Pick a date">
        </div>
      </div>
      <div class="field">
        <div class="fl">Note <span style="text-transform:none;color:var(--faint);font-weight:500;">(optional)</span></div>
        <input class="noteinput" id="noteInput" placeholder="e.g. lunch with friends" autocomplete="off">
      </div>
      <button class="savebtn" id="saveBtn" disabled>Save expense</button>
    </div>
  </section>

  <!-- STUB (analyse / more) -->
  <section class="screen" id="screen-stub">
    <div class="topbar"><h1 id="stubTitle">Analysis</h1></div>
    <div class="stub">
      <span class="icon" data-ico="chart"></span>
      <h2 id="stubHead">Charts coming next</h2>
      <p id="stubBody">Spending by category, month-over-month, and your daily pace. This is the natural fourth screen to build once logging feels right.</p>
    </div>
  </section>

  <!-- NAV -->
  <nav class="nav" id="nav">
    <button data-nav="home" class="on"><span class="icon" data-ico="home"></span>Home</button>
    <button data-nav="list"><span class="icon" data-ico="list"></span>Expenses</button>
    <button data-nav="add"><span class="icon" data-ico="plus"></span>Add</button>
    <button data-nav="analyse"><span class="icon" data-ico="chart"></span>Analysis</button>
    <button data-nav="more"><span class="icon" data-ico="dots"></span>More</button>
  </nav>
</div>

<script>
"use strict";

/* ---------- icons (inline SVG, offline-safe) ---------- */
const P = (d,extra="") => `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">${d}${extra}</svg>`;
const ICONS = {
  home:  P('<path d="M3 11.2 12 4l9 7.2"/><path d="M5 10v10h14V10"/>'),
  cart:  P('<circle cx="9" cy="20" r="1.3"/><circle cx="18" cy="20" r="1.3"/><path d="M3 4h2l2.2 11.2a1 1 0 0 0 1 .8h8.6a1 1 0 0 0 1-.8L20 8H6"/>'),
  food:  P('<path d="M5 3v7a2 2 0 0 0 4 0V3M7 10v11"/><path d="M16 3c-1.5 0-2.5 2-2.5 4.5S15 12 16 12v9"/>'),
  bus:   P('<rect x="4" y="4" width="16" height="12" rx="2"/><path d="M4 11h16"/><circle cx="8" cy="19" r="1.3"/><circle cx="16" cy="19" r="1.3"/><path d="M7 16v2M17 16v2"/>'),
  plane: P('<path d="M10.5 2.5c.8-.8 2-.8 2.6 0 .5.7.4 1.6-.2 2.2L11 6.6l1.6 6.4 2-2a1.4 1.4 0 0 1 2 2l-2.6 2.6.6 3.2-1.6 1-2-3.6-2 3.6-1.6-1 .6-3.2L5.4 15a1.4 1.4 0 0 1-2-2l2-2L7 12.6l-1.9-6.4-1.9 1.1c-.6.4-1.4.2-1.7-.4"/>'),
  glass: P('<path d="M5 4h14l-6 7v6"/><path d="M9 20h6"/>'),
  refresh:P('<path d="M4 12a8 8 0 0 1 13.7-5.6L21 9"/><path d="M21 4v5h-5"/><path d="M20 12a8 8 0 0 1-13.7 5.6L3 15"/><path d="M3 20v-5h5"/>'),
  bucket:P('<path d="M4 7h16l-1.4 12.2a1 1 0 0 1-1 .8H6.4a1 1 0 0 1-1-.8L4 7Z"/><path d="M3 7h18"/><path d="M9 4h6"/>'),
  list:  P('<path d="M8 6h13M8 12h13M8 18h13"/><path d="M3.5 6h.01M3.5 12h.01M3.5 18h.01"/>'),
  chart: P('<path d="M4 20V10M10 20V4M16 20v-6M4 20h16"/>'),
  dots:  P('<circle cx="5" cy="12" r="1.4"/><circle cx="12" cy="12" r="1.4"/><circle cx="19" cy="12" r="1.4"/>'),
  plus:  P('<path d="M12 5v14M5 12h14"/>'),
  x:     P('<path d="M6 6l12 12M18 6 6 18"/>'),
  trash: P('<path d="M4 7h16M9 7V5a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2M6 7l1 13a1 1 0 0 0 1 1h8a1 1 0 0 0 1-1l1-13"/>'),
  edit:  P('<path d="M4 20h4L18.5 9.5a2.12 2.12 0 0 0-3-3L5 17v3Z"/><path d="M13.5 6.5l3 3"/>'),
  calendar:P('<rect x="4" y="5" width="16" height="16" rx="2"/><path d="M4 9h16M8 3v4M16 3v4"/>'),
  settings:P('<path d="M9 4h6l.6 2.5 2.2 1.3 2.4-.8 3 5.2-1.8 1.7v2.6l1.8 1.7-3 5.2-2.4-.8-2.2 1.3L15 22H9l-.6-2.6-2.2-1.3-2.4.8-3-5.2 1.8-1.7v-2.6L.8 8.5l3-5.2 2.4.8L8.4 2.8" transform="scale(.8) translate(3 3)"/><circle cx="12" cy="12" r="3"/>'),
  filter:P('<path d="M3 5h18l-7 8v5l-4 2v-7L3 5Z"/>'),
  lock:  P('<rect x="5" y="11" width="14" height="9" rx="2"/><path d="M8 11V8a4 4 0 0 1 8 0v3"/>'),
  chevron:P('<path d="M6 9l6 6 6-6"/>'),
};
function paintIcons(root){ (root||document).querySelectorAll('[data-ico]').forEach(e=>{ if(!e.dataset.done){ e.innerHTML = ICONS[e.dataset.ico]||''; e.classList.add('icon'); e.dataset.done="1"; }}); }

/* ---------- data ---------- */
const CATS = [
  {id:'rent',      name:'Rent',          color:'#5B51C6', icon:'home',   fixed:true},
  {id:'groceries', name:'Groceries',     color:'#5E9022', icon:'cart',   fixed:false},
  {id:'eating',    name:'Eating out',    color:'#D2582E', icon:'food',   fixed:false},
  {id:'transport', name:'Transport',     color:'#2F82D6', icon:'bus',    fixed:false},
  {id:'trips',     name:'Trips',         color:'#1B9670', icon:'plane',  fixed:false},
  {id:'nightlife', name:'Nightlife',     color:'#CB4E77', icon:'glass',  fixed:false},
  {id:'subs',      name:'Subscriptions', color:'#B06E14', icon:'refresh',fixed:true},
  {id:'household', name:'Household',     color:'#726D64', icon:'bucket', fixed:false},
];
const catById = id => CATS.find(c=>c.id===id);
const VARIABLE_BUDGET = 600;

let uid = 1;
const nid = () => 'e'+(uid++);
/* clamp any seed day into [1 .. today] so sample data always lands in the current month */
function d(day,h){ const n=new Date(); const dd=Math.max(1,Math.min(day,n.getDate())); return new Date(n.getFullYear(),n.getMonth(),dd,h||12,0).toISOString(); }

const _span = Math.max(1, Math.min(new Date().getDate(), 24));
const _varSeed = [            /* oldest -> newest */
  ['eating',4.80,'Coffee'], ['household',8.40,'Detergent'], ['nightlife',16.00,'Club'],
  ['trips',42.00,'Weekend trip'], ['transport',7.80,'Train'], ['groceries',31.20,'Lidl run'],
  ['eating',14.90,'Burger'], ['nightlife',22.00,'Bar'], ['transport',9.00,'Metro card'],
  ['groceries',23.80,'Albert Heijn'], ['eating',12.50,'Ramen'],
];
let expenses = [
  {id:nid(), cat:'rent', amount:450,   note:'',           date:d(1,9)},
  {id:nid(), cat:'subs', amount:10.99, note:'Spotify',    date:d(2,8)},
  {id:nid(), cat:'subs', amount:12.50, note:'Phone plan', date:d(3,8)},
];
_varSeed.forEach((s,i)=>{
  const day = 1 + Math.round((_span-1) * (i/(_varSeed.length-1)));
  expenses.push({id:nid(), cat:s[0], amount:s[1], note:s[2], date:d(day, 9+(i%12))});
});

/* persistence: works when the file runs on your device; degrades silently in previews */
const STORE='spend_v1';
function save(){ try{ localStorage.setItem(STORE, JSON.stringify(expenses)); }catch(e){} }
function load(){ try{ const r=localStorage.getItem(STORE); if(r){ const p=JSON.parse(r); if(Array.isArray(p)&&p.length){ expenses=p; } } }catch(e){} }

/* ---------- helpers ---------- */
const eur = new Intl.NumberFormat('nl-NL',{style:'currency',currency:'EUR'});
const money = n => eur.format(n);
function thisMonth(e){ const d=new Date(e.date), n=new Date(); return d.getFullYear()===n.getFullYear() && d.getMonth()===n.getMonth(); }
function startDay(d){ return new Date(d.getFullYear(),d.getMonth(),d.getDate()).getTime(); }
function dayLabel(iso){
  const d=new Date(iso), diff=Math.round((startDay(new Date())-startDay(d))/86400000);
  if(diff===0) return 'Today'; if(diff===1) return 'Yesterday';
  return d.toLocaleDateString('en-GB',{day:'numeric',month:'short'});
}
function daysElapsed(){ return new Date().getDate(); }
function daysLeftInMonth(){ const n=new Date(); return new Date(n.getFullYear(),n.getMonth()+1,0).getDate()-n.getDate(); }
const pad2=n=>String(n).padStart(2,'0');
function isoDay(dt){ return dt.getFullYear()+'-'+pad2(dt.getMonth()+1)+'-'+pad2(dt.getDate()); }   /* YYYY-MM-DD */
function todayStr(){ return isoDay(new Date()); }
/* turn a picked YYYY-MM-DD into a stored timestamp: keep 'now' if it's today, else noon that day */
function stampFor(dayStr){
  if(dayStr===todayStr()) return new Date().toISOString();
  const [y,m,dd]=dayStr.split('-').map(Number);
  return new Date(y,m-1,dd,12,0).toISOString();
}

/* ---------- state ---------- */
let currentScreen='home';
let filter='all';
let openRow=null;
let editingId=null;
const draft={ amount:0, cat:null, note:'', day:todayStr() };

/* ---------- HOME ---------- */
function renderHome(){
  document.getElementById('monthLabel').innerHTML =
    new Date().toLocaleDateString('en-GB',{month:'long',year:'numeric'}) +
    ' <span class="icon" style="width:16px;height:16px;color:var(--faint)" data-ico="chevron"></span>';

  const month = expenses.filter(thisMonth);
  const total = month.reduce((s,e)=>s+e.amount,0);
  const fixed = month.filter(e=>catById(e.cat).fixed).reduce((s,e)=>s+e.amount,0);
  const variable = total - fixed;
  const left = VARIABLE_BUDGET - variable;
  const pct = Math.min(100, Math.round(variable/VARIABLE_BUDGET*100));
  const over = variable > VARIABLE_BUDGET;

  const byCat = CATS.map(c=>({c, sum: month.filter(e=>e.cat===c.id).reduce((s,e)=>s+e.amount,0)}))
                    .filter(x=>x.sum>0).sort((a,b)=>b.sum-a.sum);
  const fixedNames = CATS.filter(c=>c.fixed && month.some(e=>e.cat===c.id)).map(c=>c.name).join(', ');
  const recent = [...month].sort((a,b)=>new Date(b.date)-new Date(a.date)).slice(0,4);

  const catCards = byCat.map(({c,sum})=>`
    <div class="catcard">
      <div class="dot" style="background:${c.color}"><span class="icon" data-ico="${c.icon}"></span></div>
      <div class="cn">${c.name}</div>
      <div class="cv tabular">${money(sum)}</div>
    </div>`).join('');

  const recentRows = recent.map(e=>{ const c=catById(e.cat); return `
    <div class="rowwrap"><div class="row">
      <div class="badge" style="background:${c.color}"><span class="icon" data-ico="${c.icon}"></span></div>
      <div class="rmid"><div class="t">${e.note||c.name}</div><div class="s">${c.name}</div></div>
      <div class="rright"><div class="amt tabular">${money(e.amount)}</div><div class="dt">${dayLabel(e.date)}</div></div>
    </div></div>`; }).join('') || `<div class="empty">No expenses yet this month.</div>`;

  document.getElementById('homeScroll').innerHTML = `
    <div class="hero">
      <div class="lbl">Spent this month</div>
      <div class="total tabular">${money(total)}</div>
      <div class="bar ${over?'over':''}"><i style="width:${pct}%"></i></div>
      <div class="budgetline">
        <span class="a tabular">${money(variable)} <span style="color:var(--muted);font-weight:400">of ${money(VARIABLE_BUDGET)} variable</span></span>
        <span class="b tabular">${over?money(-left)+' over':money(left)+' left'}</span>
      </div>
      <div class="fixedline">
        <span class="icon" data-ico="lock"></span>
        Fixed ${money(fixed)}${fixedNames?' · '+fixedNames:''} · ${daysLeftInMonth()} days left
      </div>
    </div>
    <button class="addbtn" data-nav="add"><span class="icon" data-ico="plus"></span>Add expense</button>
    <div class="sectlabel">Where it's going</div>
    <div class="catgrid">${catCards||''}</div>
    <div class="sectlabel">Recent <a data-nav="list" aria-label="See all">See all <span class="icon" style="width:16px;height:16px" data-ico="chevron"></span></a></div>
    <div class="rows">${recentRows}</div>
  `;
  paintIcons(document.getElementById('screen-home'));
}

/* ---------- LIST ---------- */
function renderFilters(){
  const used = CATS.filter(c=>expenses.some(e=>e.cat===c.id));
  const chips = [{id:'all',name:'All'}, ...used];
  document.getElementById('filterChips').innerHTML = chips.map(c=>
    `<button class="chip ${filter===c.id?'active':''}" data-filter="${c.id}">${c.name}</button>`).join('');
}
function renderList(){
  renderFilters();
  let items = expenses.filter(thisMonth);
  if(filter!=='all') items = items.filter(e=>e.cat===filter);
  items.sort((a,b)=>new Date(b.date)-new Date(a.date));

  const el = document.getElementById('listScroll');
  if(!items.length){ el.innerHTML = `<div class="empty">Nothing here yet. Tap Add to log an expense.</div>`; return; }

  let html='<div class="listcard">', lastDay=null;
  items.forEach(e=>{
    const c=catById(e.cat), dl=dayLabel(e.date);
    if(dl!==lastDay){ html+=`<div class="daygroup">${dl}</div>`; lastDay=dl; }
    html+=`
      <div class="rowwrap list-row ${openRow===e.id?'open':''}" data-row="${e.id}">
        <div class="actions">
          <button class="act edit" data-edit="${e.id}"><span class="icon" data-ico="edit"></span>Edit</button>
          <button class="act del" data-del="${e.id}"><span class="icon" data-ico="trash"></span>Delete</button>
        </div>
        <div class="row">
          <div class="badge" style="background:${c.color}"><span class="icon" data-ico="${c.icon}"></span></div>
          <div class="rmid"><div class="t">${e.note||c.name}</div><div class="s">${c.name}</div></div>
          <div class="rright"><div class="amt tabular">${money(e.amount)}</div></div>
        </div>
      </div>`;
  });
  html+='</div>';
  el.innerHTML=html;
  paintIcons(el);
}

/* ---------- ADD ---------- */
function renderPicker(){
  document.getElementById('pickGrid').innerHTML = CATS.map(c=>`
    <button class="pick ${draft.cat===c.id?'sel':''}" data-cat="${c.id}">
      <span class="pdot" style="background:${c.color}"><span class="icon" data-ico="${c.icon}"></span></span>${c.name}
    </button>`).join('');
  paintIcons(document.getElementById('pickGrid'));
}
function parseAmount(str){ const n=parseFloat(String(str).replace(/\./g,'').replace(',','.')); return isNaN(n)?0:n; }
function refreshSave(){
  draft.amount = parseAmount(document.getElementById('amtInput').value);
  document.getElementById('saveBtn').disabled = !(draft.amount>0 && draft.cat);
}
function syncDate(){
  document.getElementById('dateText').textContent = dayLabel(stampFor(draft.day));
  document.getElementById('dateInput').value = draft.day;
}
function openEditor(){
  const di=document.getElementById('dateInput');
  di.max = todayStr();                 /* no future dates */
  renderPicker(); syncDate(); refreshSave();
  showScreen('add');
}
function openAdd(){
  editingId=null;
  draft.amount=0; draft.cat=null; draft.note=''; draft.day=todayStr();
  const ai=document.getElementById('amtInput'); ai.value='';
  document.getElementById('noteInput').value='';
  document.getElementById('addTitle').textContent='New expense';
  document.getElementById('saveBtn').textContent='Save expense';
  openEditor();
  setTimeout(()=>ai.focus(),120);
}
function openEdit(id){
  const e=expenses.find(x=>x.id===id); if(!e) return;
  editingId=id;
  draft.amount=e.amount; draft.cat=e.cat; draft.note=e.note||''; draft.day=isoDay(new Date(e.date));
  document.getElementById('amtInput').value = e.amount.toFixed(2).replace('.',',');
  document.getElementById('noteInput').value = e.note||'';
  document.getElementById('addTitle').textContent='Edit expense';
  document.getElementById('saveBtn').textContent='Save changes';
  openEditor();
}
function commitAdd(){
  refreshSave();
  if(!(draft.amount>0 && draft.cat)) return;
  const payload = {
    cat:draft.cat,
    amount:Math.round(draft.amount*100)/100,
    note:document.getElementById('noteInput').value.trim(),
    date:stampFor(draft.day)
  };
  if(editingId){
    const e=expenses.find(x=>x.id===editingId); if(e) Object.assign(e,payload);
    editingId=null; save();
    showScreen('list'); renderHome();
  } else {
    expenses.push(Object.assign({id:nid()},payload)); save();
    showScreen('home'); renderHome(); renderList();
  }
}

/* ---------- nav ---------- */
function setNav(name){
  document.querySelectorAll('.nav button').forEach(b=>b.classList.toggle('on', b.dataset.nav===name));
}
function showScreen(name){
  const app=document.getElementById('app');
  if(name==='add'){ app.classList.add('modal');
    document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
    document.getElementById('screen-add').classList.add('active'); return; }
  app.classList.remove('modal');
  currentScreen=name; openRow=null;
  const map={home:'screen-home', list:'screen-list', analyse:'screen-stub', more:'screen-stub'};
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(map[name]).classList.add('active');
  setNav(name);
  if(name==='home') renderHome();
  if(name==='list') renderList();
  if(name==='analyse'){ document.getElementById('stubTitle').textContent='Analysis';
    document.getElementById('stubHead').textContent='Charts coming next';
    document.getElementById('stubBody').textContent='Spending by category, month-over-month, and your daily pace. The natural fourth screen to build once logging feels right.'; }
  if(name==='more'){ document.getElementById('stubTitle').textContent='More';
    document.getElementById('stubHead').textContent='Settings live here';
    document.getElementById('stubBody').textContent='Budget, categories, currency, and export. Kept out of the way so the core loop stays fast.'; }
}

/* ---------- events (delegated) ---------- */
document.getElementById('nav').addEventListener('click', e=>{
  const b=e.target.closest('[data-nav]'); if(!b) return;
  b.dataset.nav==='add' ? openAdd() : showScreen(b.dataset.nav);
});
document.getElementById('app').addEventListener('click', e=>{
  const navEl=e.target.closest('[data-nav]');
  if(navEl && !navEl.closest('#nav')){ navEl.dataset.nav==='add'?openAdd():showScreen(navEl.dataset.nav); return; }

  const chip=e.target.closest('[data-filter]');
  if(chip){ filter=chip.dataset.filter; openRow=null; renderList(); return; }

  const ed=e.target.closest('[data-edit]');
  if(ed){ openEdit(ed.dataset.edit); return; }

  const del=e.target.closest('[data-del]');
  if(del){ expenses=expenses.filter(x=>x.id!==del.dataset.del); openRow=null; save(); renderList(); return; }

  const rw=e.target.closest('.list-row[data-row]');
  if(rw){ openRow = openRow===rw.dataset.row ? null : rw.dataset.row; renderList(); return; }

  const pick=e.target.closest('[data-cat]');
  if(pick){ draft.cat=pick.dataset.cat; renderPicker(); refreshSave(); return; }
});
document.getElementById('addBack').addEventListener('click', ()=>{
  const back = editingId ? 'list' : 'home'; editingId=null; showScreen(back);
});
document.getElementById('saveBtn').addEventListener('click', commitAdd);
document.getElementById('amtInput').addEventListener('input', e=>{
  e.target.value = e.target.value.replace(/[^0-9.,]/g,''); refreshSave();
});
document.getElementById('dateInput').addEventListener('change', e=>{
  draft.day = e.target.value || todayStr(); syncDate();
});
document.getElementById('noteInput').addEventListener('keydown', e=>{ if(e.key==='Enter'){ e.preventDefault(); commitAdd(); }});

/* ---------- init ---------- */
load();
paintIcons(document);
showScreen('home');
</script>
</body>
</html>
